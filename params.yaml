TrainingArguments:

  # Memory Management
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  gradient_checkpointing: False
  save_total_limit: 2

  # Training Dynamics
  num_train_epochs: 4
  learning_rate: 0.0003
  lr_scheduler_type: linear
  weight_decay: 0.01
  warmup_steps: 40
  logging_steps: 10

  # Evaluation & Saving
  evaluation_strategy: steps
  eval_steps: 200
  save_strategy: steps
  save_steps: 200
  load_best_model_at_end: True
  
  # CPU Specifics
  use_cpu: True
  fp16: False                  
  bf16: False
  max_grad_norm: 1.0